# VIRGIN SIGN-OFF SEEDS - RUN ONLY ON A LOCK CANDIDATE, ONE SHOT PER CANDIDATE,
# NEVER FOR TUNING.
#
# Falsifiable cost claims A/B/C (docs/BALANCE-COST.md).
# Bounded hard map + close starts + damage-diff stalemate scoring + closing policies.
#
# Claim A: equal-budget swarm (destroyers) vs titan_light (min fill).
# Claim B: equal-budget destroyers vs titan_heavy (max fill) — forced engagement.
# Claim C: fixed 8 destroyers vs titan_heavy (count, not pure cost).
#
# Asymmetric policies (not only greedy mirrors).
#
# SEED PROTOCOL: seeds 264-327 are held out from all tuning runs
# (abc_claims.toml uses 1-63, abc_claims_pooled.toml uses 1-191). Spend them
# ONLY to certify a specific lock candidate, and only once per candidate —
# re-running after a tuning tweak burns the holdout's validity.
#
#   cargo run --release --bin shipsim-sim -- \
#     --suite simulation/suites/abc_claims_signoff.toml \
#     --output tmp/simulation/reports/abc_claims_signoff.json

name = "abc cost claims (VIRGIN SIGN-OFF seeds 264-327)"
# 4 engagements × 4 matchups × 64 seeds = 1024 matches.
seeds = [
  264, 265, 266, 267, 268, 269, 270, 271, 272, 273, 274, 275, 276, 277, 278, 279, 280, 281, 282, 283,
  284, 285, 286, 287, 288, 289, 290, 291, 292, 293, 294, 295, 296, 297, 298, 299, 300, 301, 302, 303,
  304, 305, 306, 307, 308, 309, 310, 311, 312, 313, 314, 315, 316, 317, 318, 319, 320, 321, 322, 323,
  324, 325, 326, 327,
]
max_turns = 60
max_orders = 60000
skip_cost_validation = true
stalemate_scoring = "damage_diff"
rubrics = [
  "simulation/rubrics/fleet-safety.toml",
  "simulation/rubrics/abc-claims.toml",
]

[map]
width = 24
height = 18
map_mode = "hard"

# Asymmetric policy pairs (best-response style probes).
[[matchups]]
player = "greedy"
opponent = "aggressive"

[[matchups]]
player = "aggressive"
opponent = "defensive"

[[matchups]]
player = "greedy"
opponent = "defensive"

[[matchups]]
player = "aggressive"
opponent = "greedy"

# Lever #5 costs (destroyer_line=100): titan_light≈762, titan_heavy≈910.
# Round(cost/100) alone overshot (8 vs light → A 94%; 9 vs heavy → B 100% titan).
# Tuned counts: A underpays slightly (7×100 < 762); B overpays slightly (10×100 > 910).
[[engagements]]
name = "A_swarm_vs_titan_min"
player = [{ class = "destroyer_line", count = 7 }]
opponent = [{ class = "titan_light", count = 1 }]

[[engagements]]
name = "B_swarm_vs_titan_max"
player = [{ class = "destroyer_line", count = 10 }]
opponent = [{ class = "titan_heavy", count = 1 }]

[[engagements]]
name = "C_eight_dd_vs_titan_max"
player = [{ class = "destroyer_line", count = 8 }]
opponent = [{ class = "titan_heavy", count = 1 }]


# Control: destroyer mirror (equal)
[[engagements]]
name = "control_destroyer_mirror"
player = [{ class = "destroyer_line", count = 4 }]
opponent = [{ class = "destroyer_line", count = 4 }]
