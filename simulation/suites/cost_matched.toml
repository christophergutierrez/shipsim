# Equal-construction-budget fleet matchups (docs/BALANCE-COST.md).
# Frame/module costs after lever #5; destroyer_line = 100.
#
#   cargo run --release --bin shipsim-sim -- \
#     --suite simulation/suites/cost_matched.toml \
#     --output tmp/simulation/reports/cost_matched.json

name = "cost-matched size fleets"
seeds = [1, 2, 3, 4, 5, 6, 7, 8]
max_turns = 60
max_orders = 60000
cost_tolerance = 100
stalemate_scoring = "damage_diff"
rubrics = [
  "simulation/rubrics/fleet-safety.toml",
  "simulation/rubrics/cost-matched.toml",
]

[map]
width = 24
height = 18
map_mode = "hard"

[[matchups]]
player = "greedy"
opponent = "aggressive"

[[matchups]]
player = "aggressive"
opponent = "defensive"

# 8×100 = 800 vs titan_line ~822
[[engagements]]
name = "swarm_vs_titan"
player = [{ class = "destroyer_line", count = 8 }]
opponent = [{ class = "titan_line", count = 1 }]

# 3×304 = 912 vs 9×100 = 900
[[engagements]]
name = "heavies_vs_swarm"
player = [{ class = "heavy_cruiser_line", count = 3 }]
opponent = [{ class = "destroyer_line", count = 9 }]

# 2×441 = 882 vs 9×100 = 900
[[engagements]]
name = "battleships_vs_swarm"
player = [{ class = "battleship_line", count = 2 }]
opponent = [{ class = "destroyer_line", count = 9 }]

# 625+200 = 825 vs 3×304 = 912
[[engagements]]
name = "dreadnought_screen_vs_heavies"
player = [
  { class = "dreadnought_line", count = 1 },
  { class = "destroyer_line", count = 2 },
]
opponent = [{ class = "heavy_cruiser_line", count = 3 }]

[[engagements]]
name = "destroyer_mirror"
player = [{ class = "destroyer_line", count = 4 }]
opponent = [{ class = "destroyer_line", count = 4 }]
